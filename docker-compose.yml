version: '3.7'

services:
  elasticsearch:
    image: elasticsearch:8.8.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=admin
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - food-network
    volumes:
      - es_data:/usr/share/elasticsearch/data  # Persist data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.2.0
    container_name: logstash
    restart: unless-stopped
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/config:/usr/share/logstash/config
    depends_on:
      - elasticsearch
    networks:
      - food-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.2.0
    container_name: kibana
    restart: unless-stopped
    environment:
      - KIBANA_SYSTEM_PASSWORD=admin
    ports:
      - "5601:5601"
    networks:
      - food-network
    depends_on:
      - elasticsearch
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro,Z

  zookeeper:
    image: zookeeper:3.4.9
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - food-network
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_BROKER_ID: "1"
    depends_on:
      - zookeeper
    networks:
      - food-network
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  kafbat-ui:
    container_name: kafbat-ui
    image: ghcr.io/kafbat/kafka-ui
    ports:
      - "8089:8080"
    restart: always
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
    volumes:
      - ./kafka-ui/config.yml:/etc/kafkaui/dynamic_config.yaml
    depends_on:
      - kafka
    networks:
      - food-network
    healthcheck:
      test: wget --no-verbose --tries=1 --spider localhost:8089 || exit 1
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    restart: unless-stopped
    hostname: kafka-exporter
    container_name: kafka-exporter
    command: --kafka.server=kafka:9092 --log.level=debug
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    networks:
      - food-network

  # prometheus:
  #   image: prom/prometheus:latest
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - food-network

  # grafana:
  #   image: grafana/grafana:latest
  #   depends_on:
  #     - prometheus
  #   ports:
  #     - "3001:3000"
  #   networks:
  #     - food-network
  #   volumes:
  #     - grafana-storage:/var/lib/grafana

  auth-service:
    image: auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      - SECRET_KEY=123456ABC
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DATABASE_NAME=food_users
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CLIENT_ID=auth-service
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT
      - KAFKA_SOCKET_TIMEOUT_MS=60000
      - KAFKA_REQUEST_TIMEOUT_MS=30000
      - KAFKA_RETRY_BACKOFF_MS=1000
      - KAFKA_MAX_RETRIES=3
    volumes:
      - ./auth-service:/app
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  restaurant-service:
    image: restaurant-service:latest
    container_name: restaurant-service
    restart: unless-stopped
    build:
      context: ./restaurant-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    depends_on:
      - kafka
      - postgres
    environment:
      - SECRET_KEY=123456ABC
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DATABASE_NAME=food_restaurants
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - AUTH_SERVICE_URL=http://auth-service:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CLIENT_ID=restaurant-service
      - KAFKA_GROUP_ID=restaurant-service-group
    volumes:
      - ./restaurant-service:/app
    networks:
      - food-network

  order-service:
    image: order-service:latest
    container_name: order-service
    restart: unless-stopped
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    depends_on:
      - kafka
      - postgres
    environment:
      - SECRET_KEY=123456ABC
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DATABASE_NAME=food_orders
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - AUTH_SERVICE_URL=http://auth-service:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CLIENT_ID=order-service
      - KAFKA_GROUP_ID=order-service-group
    volumes:
      - ./order-service:/app
    networks:
      - food-network

  notification-service:
    image: notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    depends_on:
      - kafka
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CLIENT_ID=notification-service
      - KAFKA_GROUP_ID=notification-service-group
    volumes:
      - ./notification-service:/app
    networks:
      - food-network

  delivery-service:
    image: delivery-service:latest
    container_name: delivery-service
    restart: unless-stopped
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    depends_on:
      - kafka
    environment:
      - PORT=5004
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CLIENT_ID=delivery-service
      - KAFKA_GROUP_ID=delivery-service-group
    volumes:
      - ./delivery-service:/app
    networks:
      - food-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - food-network

  kong:
    image: kong/kong-gateway:3.8.0.0
    container_name: kong
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "7000:8000"    # Proxy
      - "7443:8443"    # Proxy (SSL)
      - "8001:8001"    # Admin
      - "7002:8002"    # GUI
      - "7444:8444"    # Admin (SSL)
    #    environment:
    #      - KONG_DATABASE=postgres
    #      - KONG_PG_HOST=postgres
    #      - KONG_PG_PORT=5432
    #      - KONG_PG_USER=postgres
    #      - KONG_PG_PASSWORD=postgres
    #      - KONG_PG_DATABASE=kong
    environment:
      - KONG_DATABASE=off       # Disable database mode
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml # Use kong.yml
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_ADMIN_GUI_URL=http://localhost:7002
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    networks:
      - food-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7001/" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  food-network:
    driver: bridge

volumes:
  db-data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  grafana-storage:
  es_data:
