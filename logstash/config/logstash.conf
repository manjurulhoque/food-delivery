input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Drop noisy Django autoreload messages
  if [logger] == "django.utils.autoreload" {
    drop { }
  }
  if [message] =~ /Watching for file changes/ {
    drop { }
  }

  # Add a default service tag if none is set by the sender
  if ![service] {
    mutate {
      add_field => { "service" => "unknown" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "kibana_system"
    password => "admin"
    index => "food-delivery-logs-%{+YYYY.MM.dd}"
  }
}
