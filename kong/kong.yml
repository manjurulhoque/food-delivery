_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:5000
    connect_timeout: 60000  # 60 seconds
    write_timeout: 60000    # 60 seconds
    read_timeout: 60000     # 60 seconds
    routes:
      - name: auth-route
        paths:
          - /api/auth/
  - name: restaurant-service
    url: http://restaurant-service:5001
    connect_timeout: 60000  # 60 seconds
    write_timeout: 60000    # 60 seconds
    read_timeout: 60000     # 60 seconds
    routes:
      - name: restaurant-route
        paths:
          - /api/restaurants/
  - name: order-service
    url: http://order-service:5002
    connect_timeout: 60000  # 60 seconds
    write_timeout: 60000    # 60 seconds
    read_timeout: 60000     # 60 seconds
    routes:
      - name: order-route
        paths:
          - /api/orders/
  - name: notification-service
    url: http://notification-service:5003
    connect_timeout: 60000  # 60 seconds
    write_timeout: 60000    # 60 seconds
    read_timeout: 60000     # 60 seconds
    routes:
      - name: notification-route
        paths:
          - /api/notifications/

plugins:
- name: cors
  service: auth-service
  config:
    origins:
      - http://localhost:3000
    methods:
      - GET
      - POST
      - OPTIONS
    headers:
      - Authorization
      - Content-Type
    exposed_headers:
      - X-Custom-Header
    max_age: 3600
    credentials: true
- name: cors
  service: restaurant-service
  config:
    origins:
      - http://localhost:3000
    methods:
      - GET
      - POST
      - OPTIONS
    headers:
      - Authorization
      - Content-Type
    exposed_headers:
      - X-Custom-Header
    max_age: 3600
    credentials: true
- name: cors
  service: order-service
  config:
    origins:
      - http://localhost:3000
    methods:
      - GET
      - POST
      - OPTIONS
    headers:
      - Authorization
      - Content-Type
    exposed_headers:
      - X-Custom-Header
    max_age: 3600
    credentials: true